<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wall Editor - Hold Detection</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.95);
            --text-color: #f8fafc;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: rgba(255, 255, 255, 0.1);
            --selected-color: #fca5a5;
            --box-color: #22c55e;
            --overlay-opacity: 0.8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link:hover {
            color: var(--primary-hover);
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-controls label {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        /* --- Main Layout --- */
        .editor-layout {
            display: flex;
            flex: 1;
            height: calc(100vh - 65px);
            overflow: hidden;
        }

        /* --- Viewport (Left Pane) --- */
        .main-viewport {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .canvas-container {
            position: relative;
            transform-origin: center center;
            transition: transform 0.1s linear; /* Smooth but fast for zooming, disabled during pan */
            will-change: transform;
            /* width/height will be determined by image natural size fitting in viewport initially */
        }

        #wall-image {
            display: block;
            max-width: none; /* Let it dictate size based on zoom */
            pointer-events: none; /* Let the container handle drag */
            user-select: none;
            -webkit-user-drag: none;
        }

        #holds-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let hitboxes capture clicks */
        }

        /* --- Density & Zoom Logic --- */
        /* default styles (zoomed in) */
        
        .hold-group {
            position: absolute;
            pointer-events: none; /* Group itself doesn't catch clicks */
        }

        .hold-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid var(--box-color);
            background-color: rgba(34, 197, 94, 0.1);
            opacity: var(--overlay-opacity);
            box-sizing: border-box;
            transition: border-color 0.2s, background-color 0.2s, opacity 0.2s;
            pointer-events: none;
        }

        .hold-label {
            position: absolute;
            top: -20px;
            left: -2px;
            background: var(--box-color);
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 2px;
            white-space: nowrap;
            opacity: var(--overlay-opacity);
            pointer-events: auto;
            cursor: grab;
        }
        
        .hold-label:active {
            cursor: grabbing;
        }

        .hold-hitbox {
            position: absolute;
            /* Expand hitbox slightly outside the visual box */
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            pointer-events: auto; /* Catch clicks */
            cursor: pointer;
            z-index: 10;
        }

        /* Hover effect via hitbox (requires adjacent sibling selector or JS) */
        .hold-hitbox:hover + .hold-box {
            background-color: rgba(34, 197, 94, 0.3);
        }

        /* Selected State */
        .hold-group.selected {
            z-index: 1000 !important; /* Bring to front */
        }

        .hold-group.selected .hold-box {
            border-color: var(--selected-color);
            background-color: rgba(252, 165, 165, 0.2);
            border-width: 3px;
            opacity: 1 !important; /* Selected always fully visible */
            box-shadow: 0 0 10px var(--selected-color);
        }

        .hold-group.selected .hold-label {
            background: var(--selected-color);
            opacity: 1 !important;
        }

        /* Resize Handles - only visible when selected */
        .hold-group.selected .resize-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border: 2px solid var(--primary);
            border-radius: 50%;
            z-index: 1001; /* Above the label */
            pointer-events: auto; /* Catch drags */
            /* Offset so they center on the corner */
            transform: translate(-50%, -50%);
        }
        
        .hold-group.selected .resize-handle.nw { top: 0; left: 0; cursor: nwse-resize; }
        .hold-group.selected .resize-handle.ne { top: 0; left: 100%; cursor: nesw-resize; }
        .hold-group.selected .resize-handle.sw { top: 100%; left: 0; cursor: nesw-resize; }
        .hold-group.selected .resize-handle.se { top: 100%; left: 100%; cursor: nwse-resize; }

        /* Hidden State */
        .hold-group.hidden:not(.selected) {
            display: none !important;
        }
        .hold-group.hidden:not(.selected) .hold-box {
            border-style: dashed;
        }

        /* Temp Hold Box for Adding */
        #temp-hold-box {
            position: absolute;
            border: 2px dashed var(--primary);
            background-color: rgba(59, 130, 246, 0.2);
            pointer-events: none;
            z-index: 2000;
            display: none;
        }

        .canvas-container.adding-hold {
            cursor: crosshair;
        }

        /* Canvas is-editing state (dim other holds) */
        .canvas-container.is-editing .hold-group:not(.selected) {
            opacity: 0.2 !important;
            pointer-events: none;
        }

        /* Zoomed Out State (Low Scale) */
        .canvas-container.zoom-low .hold-group:not(.selected) .hold-label {
            display: none;
        }

        .canvas-container.zoom-low .hold-box {
            border-width: 1px;
            /* Opacity is driven by css var, but we might want it even lower in zoom-low, but var is fine for now */
        }

        
        /* --- Inspector Tabs --- */
        .inspector-tabs { display: flex; border-bottom: 1px solid var(--border-color); background: rgba(15, 23, 42, 0.5); flex-shrink: 0;}
        .tab-btn { flex: 1; padding: 1rem 0; background: none; border: none; border-bottom: 2px solid transparent; color: #94a3b8; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.85rem; }
        .tab-btn:hover { color: var(--text-color); }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(59, 130, 246, 0.1); }
        .tab-content { display: none; flex: 1; overflow-y: hidden; flex-direction: column; } /* hidden because inner has auto */
        .tab-content.active { display: flex; }

        /* List */
        .hold-list-container { flex: 1; overflow-y: auto; }
        .hold-list-item { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }
        .hold-list-item:hover { background: rgba(255,255,255,0.05); }
        .hold-list-item.selected { background: rgba(59, 130, 246, 0.2); border-left: 3px solid var(--primary); }
        .hold-list-item.hidden-item { opacity: 0.5; font-style: italic; }

        /* Display Modes & View Toggles */
        .canvas-container.mode-overview .hold-group:not(.selected) .hold-label { display: none; }
        .canvas-container.mode-edit .hold-group:not(.selected) { opacity: 0.35 !important; }
        
        /* Toggles */
        .canvas-container.hide-boxes .hold-group:not(.selected) .hold-box { border-color: transparent !important; background-color: transparent !important; }
        .canvas-container.hide-labels .hold-group:not(.selected) .hold-label { display: none !important; }
        .canvas-container.show-confidence .hold-label::after { content: " " attr(data-conf); font-size: 0.8em; opacity: 0.8; }
        .canvas-container.show-hidden-visible .hold-group.hidden:not(.selected) { display: block !important; opacity: 0.3 !important; }

/* --- Viewport Controls --- */
        .viewport-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            background: var(--panel-bg);
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            z-index: 100;
        }

        .viewport-controls button {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            cursor: pointer;
        }

        .viewport-controls button:hover {
            background: rgba(255,255,255,0.2);
        }

        /* --- Inspector Panel (Right Pane) --- */
        .inspector-panel {
            width: 350px;
            background: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .inspector-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .inspector-header h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .inspector-body {
            padding: 1.5rem;
            flex: 1;
        }

        .empty-state {
            color: #94a3b8;
            text-align: center;
            margin-top: 2rem;
            font-style: italic;
        }

        /* Inspector Form */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-control:read-only {
            background: rgba(15, 23, 42, 0.3);
            color: #cbd5e1;
            cursor: default;
        }
        
        .form-row {
            display: flex;
            gap: 1rem;
        }
        
        .form-row .form-group {
            flex: 1;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .checkbox-group input {
            width: 1.2rem;
            height: 1.2rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.5);
            margin-bottom: 1rem;
        }

        /* Auth styling (reused from index) */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
        }
        
        #auth-card {
            background: var(--panel-bg); padding: 2rem; border-radius: 1rem;
            border: 1px solid var(--border-color); width: 300px;
        }

        button.primary-btn {
            background-color: var(--primary); color: white; border: none;
            padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer;
            width: 100%; font-weight: 500;
        }

        /* --- Route Mode --- */
        body.route-mode-active .editor-layout {
            border: 4px solid var(--primary);
            box-sizing: border-box;
        }
        
        .route-mode-banner {
            display: none;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 0.5rem;
            font-weight: bold;
            font-size: 0.9rem;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            pointer-events: none;
        }
        
        body.route-mode-active .route-mode-banner {
            display: block;
        }

        .hold-group.route-member .hold-box {
            border-color: #a855f7 !important; /* purple */
            background-color: rgba(168, 85, 247, 0.3) !important;
            border-width: 3px !important;
            opacity: 1 !important;
            box-shadow: 0 0 10px #a855f7;
        }
        
        .hold-group.route-member .hold-label {
            background: #a855f7 !important;
            color: white !important;
            opacity: 1 !important;
        }

        .route-hold-item {
            display: flex; gap: 0.5rem; align-items: center; padding: 0.5rem;
            background: rgba(255,255,255,0.05); margin-bottom: 0.5rem; border-radius: 0.25rem;
        }
        .route-hold-item input, .route-hold-item select {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white;
            padding: 0.25rem; font-size: 0.8rem; border-radius: 0.25rem;
        }

    </style>
</head>
<body>

    <!-- Auth Overlay (Shown if credentials are missing) -->
    <div id="auth-overlay" style="display: none;">
        <div id="auth-card">
            <h3 style="margin-top:0;">API Credentials</h3>
            <div class="form-group">
                <input type="text" id="username" class="form-control" placeholder="Username" value="w0nts4y">
            </div>
            <div class="form-group">
                <input type="password" id="password" class="form-control" placeholder="Password" value="v3ryc00l">
            </div>
            <button id="auth-submit" class="primary-btn">Enter</button>
        </div>
    </div>

    <!-- Main App -->
    <header>
        <div class="header-left">
            <a href="/bbro" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Dashboard
            </a>
            <h1>Wall Editor <span id="wall-id-badge" style="font-size: 0.8rem; color: #94a3b8; font-family: monospace; margin-left: 0.5rem;"></span></h1>
        </div>
        <div class="header-controls">
            <label for="opacity-slider">Overlay Opacity</label>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.8">
        </div>
    </header>

    <div class="editor-layout">
        <!-- Viewport -->
        <div class="main-viewport" id="viewport">
            <div class="route-mode-banner">ROUTE EDITING MODE ACTIVE</div>
            <div class="canvas-container" id="canvas-container">
                <img id="wall-image" src="" alt="Original Wall">
                <div id="holds-layer"></div>
                <div id="temp-hold-box"></div>
            </div>
            
            <div class="viewport-controls">
                <button id="btn-add-hold" title="Add Hold" style="background: rgba(59, 130, 246, 0.2); border-color: var(--primary); color: #93c5fd;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <div style="width: 1px; background: var(--border-color); margin: 0 0.25rem;"></div>
                <button id="btn-zoom-out" title="Zoom Out">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                </button>
                <button id="btn-zoom-reset" title="Reset View">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </button>
                <button id="btn-zoom-in" title="Zoom In">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                </button>
            </div>
        </div>

        <!-- Inspector -->
        <div class="inspector-panel">
            <div class="inspector-tabs">
                <button class="tab-btn active" data-tab="list">List</button>
                <button class="tab-btn" data-tab="details">Selected</button>
                <button class="tab-btn" data-tab="routes">Routes</button>
                <button class="tab-btn" data-tab="view">View</button>
            </div>
            
            <div class="tab-content active" id="tab-list">
                <div style="padding: 1rem; border-bottom: 1px solid var(--border-color); flex-shrink: 0;">
                    <input type="text" id="hold-search" class="form-control" placeholder="Search holds..." style="margin-bottom: 0.5rem; padding: 0.5rem;">
                    <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
                        <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" id="filter-manual" checked> Manual</label>
                        <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" id="filter-model" checked> Model</label>
                        <label style="font-size: 0.8rem; display: flex; align-items: center; gap: 0.25rem;"><input type="checkbox" id="filter-hidden"> Hidden</label>
                    </div>
                </div>
                <div class="hold-list-container" id="hold-list-container">
                    <!-- List items go here -->
                </div>
            </div>

            <div class="tab-content" id="tab-details">
                <div class="inspector-body" id="inspector-body" style="overflow-y: auto;">
                    <div class="empty-state">Select a hold on the wall to view its details.</div>
                </div>
            </div>

            <div class="tab-content" id="tab-routes" style="flex-direction: column; overflow: hidden;">
                <div class="inspector-header" style="padding: 1rem; border-bottom: 1px solid var(--border-color); flex-shrink: 0;">
                    <button id="btn-create-route" class="primary-btn" style="padding: 0.5rem; font-size: 0.85rem;">+ New Route</button>
                    <div class="form-group" style="margin-top: 1rem; margin-bottom: 0;">
                        <select id="route-select" class="form-control" style="padding: 0.5rem;">
                            <option value="">-- Select a Route --</option>
                        </select>
                    </div>
                </div>
                
                <div id="route-inspector-body" style="padding: 1rem; overflow-y: auto; flex: 1;">
                    <div class="empty-state">Select or create a route.</div>
                </div>
            </div>

            <div class="tab-content" id="tab-view" style="padding: 1.5rem; overflow-y: auto;">
                <div class="form-group">
                    <label>Display Mode</label>
                    <select id="display-mode-select" class="form-control">
                        <option value="overview">Overview (Less Clutter)</option>
                        <option value="edit">Edit (Focus Selected)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 2rem;">
                    <label>Debug Toggles</label>
                    <div class="checkbox-group" style="margin-top: 0.5rem;"><input type="checkbox" id="toggle-boxes" checked> <label style="margin:0; text-transform:none;">Show Boxes</label></div>
                    <div class="checkbox-group"><input type="checkbox" id="toggle-labels" checked> <label style="margin:0; text-transform:none;">Show Labels</label></div>
                    <div class="checkbox-group"><input type="checkbox" id="toggle-confidence"> <label style="margin:0; text-transform:none;">Show Confidence text</label></div>
                    <div class="checkbox-group"><input type="checkbox" id="toggle-hidden-visible"> <label style="margin:0; text-transform:none;">Show Hidden Holds</label></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- State Model ---
        const state = {
            currentWall: null,
            wallHolds: [],             
            selectedHoldId: null,      
            
            routes: [],
            activeRouteId: null,
            isRouteMode: false,
            
            scale: 1,
            translateX: 0,
            translateY: 0,
            
            imageNaturalWidth: 0,
            imageNaturalHeight: 0,

            isAddingHold: false,
            addStartX: 0,
            addStartY: 0,
            
            dragState: null,
            
            // UI View & Filter State
            viewOptions: {
                mode: 'overview',
                showBoxes: true,
                showLabels: true,
                showConfidence: false,
                showHiddenVisible: false
            },
            listFilters: {
                search: '',
                manual: true,
                model: true,
                hidden: false
            }
        };

        // --- DOM Elements ---
        const canvasContainer = document.getElementById('canvas-container');
        const wallImage = document.getElementById('wall-image');
        const holdsLayer = document.getElementById('holds-layer');
        const viewport = document.getElementById('viewport');
        const tempHoldBox = document.getElementById('temp-hold-box');
        
        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');
        const btnZoomReset = document.getElementById('btn-zoom-reset');
        const btnAddHold = document.getElementById('btn-add-hold');
        
        const opacitySlider = document.getElementById('opacity-slider');
        const inspectorBody = document.getElementById('inspector-body');

        // New UI Elements
        const holdListContainer = document.getElementById('hold-list-container');
        const holdSearch = document.getElementById('hold-search');
        const filterManual = document.getElementById('filter-manual');
        const filterModel = document.getElementById('filter-model');
        const filterHidden = document.getElementById('filter-hidden');
        
        const displayModeSelect = document.getElementById('display-mode-select');
        const toggleBoxes = document.getElementById('toggle-boxes');
        const toggleLabels = document.getElementById('toggle-labels');
        const toggleConfidence = document.getElementById('toggle-confidence');
        const toggleHiddenVisible = document.getElementById('toggle-hidden-visible');

        // Tab logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
                
                // If switching to list, scroll selected into view if needed
                if (btn.dataset.tab === 'list' && state.selectedHoldId) {
                    const selectedEl = document.querySelector(`.hold-list-item[data-id="${state.selectedHoldId}"]`);
                    if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest' });
                }
            });
        });

        // Filter bindings
        holdSearch.addEventListener('input', (e) => { state.listFilters.search = e.target.value.toLowerCase(); renderList(); });
        filterManual.addEventListener('change', (e) => { state.listFilters.manual = e.target.checked; renderList(); });
        filterModel.addEventListener('change', (e) => { state.listFilters.model = e.target.checked; renderList(); });
        filterHidden.addEventListener('change', (e) => { state.listFilters.hidden = e.target.checked; renderList(); });

        // View bindings
        displayModeSelect.addEventListener('change', (e) => { state.viewOptions.mode = e.target.value; applyViewSettings(); });
        toggleBoxes.addEventListener('change', (e) => { state.viewOptions.showBoxes = e.target.checked; applyViewSettings(); });
        toggleLabels.addEventListener('change', (e) => { state.viewOptions.showLabels = e.target.checked; applyViewSettings(); });
        toggleConfidence.addEventListener('change', (e) => { state.viewOptions.showConfidence = e.target.checked; applyViewSettings(); });
        toggleHiddenVisible.addEventListener('change', (e) => { state.viewOptions.showHiddenVisible = e.target.checked; applyViewSettings(); });

        function applyViewSettings() {
            canvasContainer.classList.remove('mode-overview', 'mode-edit');
            canvasContainer.classList.add('mode-' + state.viewOptions.mode);
            
            canvasContainer.classList.toggle('hide-boxes', !state.viewOptions.showBoxes);
            canvasContainer.classList.toggle('hide-labels', !state.viewOptions.showLabels);
            canvasContainer.classList.toggle('show-confidence', state.viewOptions.showConfidence);
            canvasContainer.classList.toggle('show-hidden-visible', state.viewOptions.showHiddenVisible);
        }

        // Apply initial settings
        applyViewSettings();

        // Render List
        function renderList() {
            holdListContainer.innerHTML = '';
            const frag = document.createDocumentFragment();
            let count = 0;

            state.wallHolds.forEach(hold => {
                // Apply filters
                if (!state.listFilters.hidden && hold.is_hidden) return;
                if (!state.listFilters.manual && hold.source_type === 'manual') return;
                if (!state.listFilters.model && hold.source_type !== 'manual') return;
                if (state.listFilters.search) {
                    const searchStr = `${hold.class_name || ''} ${hold.label_text || ''}`.toLowerCase();
                    if (!searchStr.includes(state.listFilters.search)) return;
                }

                count++;
                const item = document.createElement('div');
                item.className = 'hold-list-item';
                if (hold.id === state.selectedHoldId) item.classList.add('selected');
                if (hold.is_hidden) item.classList.add('hidden-item');
                item.dataset.id = hold.id;

                const nameWrap = document.createElement('div');
                const nameStr = hold.label_text ? `${hold.class_name} "${hold.label_text}"` : (hold.class_name || 'hold');
                nameWrap.innerHTML = `<strong>${nameStr}</strong><br><span style="font-size: 0.75rem; color: #64748b;">${hold.source_type === 'manual' ? 'Manual' : (hold.confidence !== null ? (hold.confidence*100).toFixed(1)+'%' : '')}</span>`;
                
                item.appendChild(nameWrap);
                
                item.addEventListener('click', () => {
                    selectHold(hold.id);
                    // auto switch to details tab
                    document.querySelector('.tab-btn[data-tab="details"]').click();
                    
                    // Pan to hold if offscreen (center it)
                    const holdCenterX = hold.x1 + (hold.x2 - hold.x1)/2;
                    const holdCenterY = hold.y1 + (hold.y2 - hold.y1)/2;
                    
                    const vw = viewport.clientWidth;
                    const vh = viewport.clientHeight;
                    
                    // target transform: center of viewport maps to holdCenter
                    state.translateX = vw/2 - (holdCenterX * state.scale);
                    state.translateY = vh/2 - (holdCenterY * state.scale);
                    updateTransform(true);
                });

                frag.appendChild(item);
            });

            if (count === 0) {
                holdListContainer.innerHTML = '<div class="empty-state" style="margin-top:2rem;">No holds match filters.</div>';
            } else {
                holdListContainer.appendChild(frag);
            }
        }


        // Extract Wall ID from URL: /bbro/walls/{wall_id}/edit
        const cleanPath = window.location.pathname.replace(/\/$/, '');
        const urlParts = cleanPath.split('/');
        const wallId = urlParts[urlParts.length - 2];
        document.getElementById('wall-id-badge').textContent = wallId.substring(0, 8) + '...';

        // --- Auth ---
        const getAuthHeaders = () => {
            return {
                'Authorization': 'Basic ' + btoa(localStorage.getItem('hd_username') + ':' + localStorage.getItem('hd_password'))
            };
        };

        const checkAuthAndInit = () => {
            if (!localStorage.getItem('hd_username') || !localStorage.getItem('hd_password')) {
                document.getElementById('auth-overlay').style.display = 'flex';
            } else {
                initEditor();
            }
        };

        document.getElementById('auth-submit').addEventListener('click', () => {
            localStorage.setItem('hd_username', document.getElementById('username').value);
            localStorage.setItem('hd_password', document.getElementById('password').value);
            document.getElementById('auth-overlay').style.display = 'none';
            initEditor();
        });

        // --- API Helpers ---
        // Sends partial updates to backend and merges response into local state
        // IMPORTANT:
        // - Backend is source of truth
        // - Always update state.wallHolds after response
        // - Do NOT mutate state optimistically without syncing response
        async function saveHold(id, payload) {
            try {
                const res = await fetch(`/bbro/api/walls/${wallId}/holds/${id}`, {
                    method: 'PATCH',
                    headers: {
                        ...getAuthHeaders(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Failed to save hold");
                const resData = await res.json();
                
                // Full reload to ensure state consistency with backend
                await loadHolds();
            } catch (err) {
                console.error("Save hold error:", err);
                alert("Error saving changes. Check console.");
            }
        }

        // Creates a new manual hold on backend and inserts into local state
        // source_type must be "manual" (backend enforces this)
        async function createHold(holdData) {
            try {
                const res = await fetch(`/bbro/api/walls/${wallId}/holds`, {
                    method: 'POST',
                    headers: {
                        ...getAuthHeaders(),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(holdData)
                });
                if (!res.ok) throw new Error("Failed to create hold");
                const resData = await res.json();
                
                await loadHolds();
                selectHold(resData.id);
            } catch (err) {
                console.error("Create hold error:", err);
                alert("Error creating hold. Check console.");
            }
        }

        async function deleteHold(id) {
            if (!confirm("Are you sure you want to delete this hold?")) return;
            try {
                const res = await fetch(`/bbro/api/walls/${wallId}/holds/${id}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                if (!res.ok) throw new Error("Failed to delete hold");
                
                selectHold(null);
                await loadHolds();
            } catch (err) {
                console.error("Delete hold error:", err);
                alert("Error deleting hold. Check console.");
            }
        }

        // Converts mouse position (viewport space) → image coordinate space
        // IMPORTANT:
        // - Must account for zoom + pan offsets
        // - All backend values are stored in image coordinates
        // - If this breaks, holds will drift or save incorrectly
        function getViewportToImageCoords(clientX, clientY) {
            const rect = canvasContainer.getBoundingClientRect();
            // Calculate position relative to container, taking scale into account
            const x = (clientX - rect.left) / state.scale;
            const y = (clientY - rect.top) / state.scale;
            
            // Constrain to image bounds
            return {
                x: Math.max(0, Math.min(x, state.imageNaturalWidth)),
                y: Math.max(0, Math.min(y, state.imageNaturalHeight))
            };
        }

        // --- Init ---
        async function initEditor() {
            console.log("wallId", wallId);
            try {
                // 1. Fetch Wall Metadata
                const wallRes = await fetch(`/bbro/api/walls/${wallId}`, { headers: getAuthHeaders() });
                console.log("wallRes status", wallRes.status);
                if (!wallRes.ok) throw new Error("Failed to load wall");
                state.currentWall = await wallRes.json();
                console.log("wallData", state.currentWall);
                
                // 2. Load Original Image
                // We fetch the original image blob so we don't get cors/auth issues with img src directly
                const imgRes = await fetch(`/bbro/api/walls/${wallId}/image`, { headers: getAuthHeaders() });
                console.log("imgRes status", imgRes.status);
                if (!imgRes.ok) throw new Error("Failed to load original image");
                const blob = await imgRes.blob();
                
                wallImage.onload = () => {
                    state.imageNaturalWidth = wallImage.naturalWidth;
                    state.imageNaturalHeight = wallImage.naturalHeight;
                    console.log("image dims", state.imageNaturalWidth, state.imageNaturalHeight);
                    
                    // Set container size to match natural size for 1:1 coordinate mapping
                    canvasContainer.style.width = `${state.imageNaturalWidth}px`;
                    canvasContainer.style.height = `${state.imageNaturalHeight}px`;
                    
                    resetViewport(); // Fit image to viewport
                    loadHolds();     // Load holds after image is ready
                    loadRoutes();
                };
                wallImage.src = URL.createObjectURL(blob);
                
            } catch (err) {
                console.error(err);
                alert("Error initializing editor: " + err.message);
            }
        }

        async function loadHolds() {
            try {
                const holdsRes = await fetch(`/bbro/api/walls/${wallId}/holds`, { headers: getAuthHeaders() });
                console.log("holdsRes status", holdsRes.status);
                if (!holdsRes.ok) throw new Error("Failed to load holds");
                state.wallHolds = await holdsRes.json();
                console.log("holds", state.wallHolds);
                
                renderHolds();
                renderList();
            } catch (err) {
                console.error(err);
                alert("Error loading holds: " + err.message);
            }
        }

        // --- Rendering Overlays ---
        function renderHolds() {
            // Clear existing
            holdsLayer.innerHTML = '';
            
            if (!state.imageNaturalWidth || !state.imageNaturalHeight) return;

            const fragment = document.createDocumentFragment();

            state.wallHolds.forEach((hold, index) => {
                // Determine z-index baseline. Later overlaps might need more logic, 
                // but default DOM order is fine. Selected item gets z-index 1000 via CSS.
                const baseZIndex = index;

                // Convert pixels to percentages relative to original image dimensions
                const leftPct = (hold.x1 / state.imageNaturalWidth) * 100;
                const topPct = (hold.y1 / state.imageNaturalHeight) * 100;
                const widthPct = ((hold.x2 - hold.x1) / state.imageNaturalWidth) * 100;
                const heightPct = ((hold.y2 - hold.y1) / state.imageNaturalHeight) * 100;

                const group = document.createElement('div');
                group.className = 'hold-group';
                if (hold.id === state.selectedHoldId) group.classList.add('selected');
                if (hold.is_hidden) group.classList.add('hidden');
                
                if (state.activeRouteId) {
                    const r = state.routes.find(route => route.id === state.activeRouteId);
                    if (r && r.holds && r.holds.find(rh => rh.wall_hold_id === hold.id)) {
                        group.classList.add('route-member');
                    }
                }
                
                group.dataset.id = hold.id;
                group.style.left = `${leftPct}%`;
                group.style.top = `${topPct}%`;
                group.style.width = `${widthPct}%`;
                group.style.height = `${heightPct}%`;
                group.style.zIndex = baseZIndex;

                // Visual Box
                const box = document.createElement('div');
                box.className = 'hold-box';

                // Label
                const label = document.createElement('div');
                label.className = 'hold-label';
                label.textContent = hold.class_name || 'hold';
                if (hold.confidence !== null) {
                    label.setAttribute('data-conf', (Math.round(hold.confidence * 100)) + '%');
                } else {
                    label.setAttribute('data-conf', 'M');
                }
                
                // If label has custom position, apply it
                // Custom positions are stored as absolute image coordinates,
                // but we are positioning the label relative to the hold's top-left corner.
                if (hold.label_x !== null && hold.label_y !== null) {
                    const labelRelX = hold.label_x - hold.x1;
                    const labelRelY = hold.label_y - hold.y1;
                    
                    // Convert back to scale-independent CSS pixels relative to the hold container
                    const relXpct = (labelRelX / (hold.x2 - hold.x1)) * 100;
                    const relYpct = (labelRelY / (hold.y2 - hold.y1)) * 100;
                    
                    label.style.left = `${relXpct}%`;
                    label.style.top = `${relYpct}%`;
                    // Override default top/left positioning overrides
                    label.style.marginLeft = '0';
                    label.style.marginTop = '0';
                }

                // Dragging label only updates label position (not bbox)
                // Stop propagation to avoid triggering viewport pan
                // Escape key should cancel and restore original position
                label.addEventListener('mousedown', (e) => {
                    e.stopPropagation(); 
                    if (state.isRouteMode) return;
                    if (state.dragState || state.isAddingHold) return;
                    selectHold(hold.id);
                    state.dragState = {
                        type: 'label',
                        holdId: hold.id,
                        startX: e.clientX,
                        startY: e.clientY,
                        originalX: hold.label_x !== null ? hold.label_x : hold.x1,
                        originalY: hold.label_y !== null ? hold.label_y : hold.y1 - 20,
                        element: label
                    };
                });

                // Hitbox (catch clicks)
                const hitbox = document.createElement('div');
                hitbox.className = 'hold-hitbox';
                
                // Interaction
                hitbox.addEventListener('mousedown', (e) => {
                    // Prevent viewport drag from starting
                    e.stopPropagation(); 
                    if (state.dragState || state.isAddingHold) return;

                    if (state.isRouteMode) {
                        if (!state.activeRouteId) {
                            alert("Please select a route first");
                            return;
                        }
                        toggleRouteHold(hold.id);
                        return;
                    }
                    
                    if (state.selectedHoldId !== hold.id) {
                        selectHold(hold.id);
                    } else {
                        // Init move if already selected
                        state.dragState = {
                            type: 'hold-move',
                            holdId: hold.id,
                            startX: e.clientX,
                            startY: e.clientY,
                            origX1: hold.x1,
                            origY1: hold.y1,
                            origX2: hold.x2,
                            origY2: hold.y2,
                            element: group
                        };
                        canvasContainer.classList.add('is-editing');
                    }
                });

                // Re-append in correct order for CSS sibling selector
                group.innerHTML = '';
                group.appendChild(label);
                group.appendChild(hitbox);
                group.appendChild(box);

                if (hold.id === state.selectedHoldId) {
                    ['nw', 'ne', 'sw', 'se'].forEach(corner => {
                        const handle = document.createElement('div');
                        handle.className = `resize-handle ${corner}`;
                        handle.addEventListener('mousedown', (e) => {
                            e.stopPropagation();
                            if (state.isRouteMode) return;
                            if (state.dragState || state.isAddingHold) return;
                            state.dragState = {
                                type: 'hold-resize',
                                handle: corner,
                                holdId: hold.id,
                                startX: e.clientX,
                                startY: e.clientY,
                                origX1: hold.x1,
                                origY1: hold.y1,
                                origX2: hold.x2,
                                origY2: hold.y2,
                                element: group
                            };
                            canvasContainer.classList.add('is-editing');
                        });
                        group.appendChild(handle);
                    });
                }

                fragment.appendChild(group);
            });

            holdsLayer.appendChild(fragment);
        }

        // --- Selection & Inspector ---
        function selectHold(holdId) {
            // Unselect previous
            if (state.selectedHoldId) {
                const prev = holdsLayer.querySelector(`.hold-group[data-id="${state.selectedHoldId}"]`);
                if (prev) prev.classList.remove('selected');
            }

            state.selectedHoldId = holdId;

            // Select new
            if (holdId) {
                const curr = holdsLayer.querySelector(`.hold-group[data-id="${holdId}"]`);
                if (curr) curr.classList.add('selected');
            }

            renderInspector();
            
            // update list highlights
            document.querySelectorAll('.hold-list-item').forEach(el => el.classList.remove('selected'));
            if (holdId) {
                const listItem = document.querySelector(`.hold-list-item[data-id="${holdId}"]`);
                if (listItem) listItem.classList.add('selected');
            }
        }

        function renderInspector() {
            if (!state.selectedHoldId) {
                inspectorBody.innerHTML = `<div class="empty-state">Select a hold on the wall to view its details.</div>`;
                return;
            }

            const hold = state.wallHolds.find(h => h.id === state.selectedHoldId);
            if (!hold) return;

            // Render form layout. Inputs are readonly for now, but prepared for future.
            inspectorBody.innerHTML = `
                <div class="badge">${hold.source_type || 'Unknown Source'}</div>
                
                <div class="form-group">
                    <label>Hold ID</label>
                    <input type="text" class="form-control" value="${hold.id}" readonly style="font-family: monospace; font-size: 0.8rem;">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Class Name</label>
                        <input type="text" class="form-control" id="inp-class-name" value="${hold.class_name || ''}">
                    </div>
                    <div class="form-group">
                        <label>Confidence</label>
                        <input type="text" class="form-control" value="${hold.confidence !== null ? (hold.confidence * 100).toFixed(1) + '%' : 'N/A'}" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label>Bounding Box (Pixels)</label>
                    <div class="form-row" style="margin-bottom: 0.5rem;">
                        <input type="text" class="form-control" value="x1: ${Math.round(hold.x1)}" readonly>
                        <input type="text" class="form-control" value="y1: ${Math.round(hold.y1)}" readonly>
                    </div>
                    <div class="form-row">
                        <input type="text" class="form-control" value="x2: ${Math.round(hold.x2)}" readonly>
                        <input type="text" class="form-control" value="y2: ${Math.round(hold.y2)}" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label>Label Text</label>
                    <input type="text" class="form-control" id="inp-label-text" value="${hold.label_text || ''}" placeholder="No label">
                </div>

                <div class="checkbox-group" style="margin-top: 1.5rem; margin-bottom: 0.5rem;">
                    <input type="checkbox" id="chk-hidden" ${hold.is_hidden ? 'checked' : ''}>
                    <label style="margin: 0; color: #e2e8f0; font-size: 0.95rem; text-transform: none; letter-spacing: normal;">Hide this hold</label>
                </div>
                ${hold.source_type !== 'manual' ? '<p style="font-size: 0.8rem; color: #94a3b8; margin: 0 0 1rem 0;">Model holds cannot be physically deleted, only hidden.</p>' : ''}
                
                <div class="checkbox-group" style="margin-bottom: ${hold.source_type === 'manual' ? '1.5rem' : '0'};">
                    <input type="checkbox" id="chk-adjusted" ${hold.is_user_adjusted ? 'checked' : ''} disabled>
                    <label style="margin: 0; color: #e2e8f0; font-size: 0.95rem; text-transform: none; letter-spacing: normal;">User adjusted</label>
                </div>

                ${hold.source_type === 'manual' ? `
                <button id="btn-delete-hold" style="width: 100%; padding: 0.75rem; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; border-radius: 0.5rem; cursor: pointer; font-weight: bold; transition: all 0.2s;">
                    Delete Hold
                </button>
                ` : ''}
            `;
            
            // Attach event listeners for immediate save
            document.getElementById('inp-class-name').addEventListener('change', (e) => {
                saveHold(hold.id, { class_name: e.target.value.trim() });
            });
            document.getElementById('inp-label-text').addEventListener('change', (e) => {
                saveHold(hold.id, { label_text: e.target.value.trim() });
            });
            document.getElementById('chk-hidden').addEventListener('change', (e) => {
                saveHold(hold.id, { is_hidden: e.target.checked });
            });

            if (hold.source_type === 'manual') {
                document.getElementById('btn-delete-hold').addEventListener('click', () => {
                    deleteHold(hold.id);
                });
            }
        }

        // --- Viewport Pan & Zoom ---
        
        const ZOOM_SPEED = 0.1;
        const MAX_ZOOM = 5;
        const MIN_ZOOM = 0.05; // allow very small for huge images

        function updateTransform(useTransition = false) {
            // Apply scale-based classes for density management
            // If scale is small (zoomed out relative to image), add low-zoom class
            // Note: scale here is CSS scale, not image scale. Because canvas is natural size, 
            // a full-res phone image (3000px) fit to screen (1000px) gives scale ~0.3.
            // Adjust threshold based on normal usage. We will use a semantic threshold:
            // if apparent box size gets small, hide labels.
            if (state.scale < 0.6) {
                canvasContainer.classList.add('zoom-low');
            } else {
                canvasContainer.classList.remove('zoom-low');
            }

            canvasContainer.style.transition = useTransition ? 'transform 0.25s cubic-bezier(0.2, 0, 0, 1)' : 'none';
            canvasContainer.style.transform = `translate(${state.translateX}px, ${state.translateY}px) scale(${state.scale})`;
        }

        function resetViewport() {
            if (!state.imageNaturalWidth) return;
            
            // Calculate scale to fit image in viewport with some padding
            const padding = 40;
            const vw = viewport.clientWidth - padding;
            const vh = viewport.clientHeight - padding;
            
            const scaleX = vw / state.imageNaturalWidth;
            const scaleY = vh / state.imageNaturalHeight;
            
            state.scale = Math.min(scaleX, scaleY, 1); // Don't scale up past 100% by default
            
            // Center it
            state.translateX = 0;
            state.translateY = 0;
            
            updateTransform(true);
            
            // Deselect
            selectHold(null);
        }

        // Mouse Drag Panning / Box Drawing
        let isDragging = false;
        let startX, startY;
        let initialTranslateX, initialTranslateY;

        viewport.addEventListener('mousedown', (e) => {
            // Cancel other interactions if we click in the viewport background
            if (e.target === viewport || e.target === wallImage || e.target === holdsLayer || e.target === canvasContainer) {
                if (state.isAddingHold) {
                    // Start drawing box
                    const coords = getViewportToImageCoords(e.clientX, e.clientY);
                    state.addStartX = coords.x;
                    state.addStartY = coords.y;
                    
                    // Show temp box
                    tempHoldBox.style.display = 'block';
                    updateTempBox(coords.x, coords.y, coords.x, coords.y);
                } else {
                    // Start pan
                    isDragging = true;
                    startX = e.clientX;
                    startY = e.clientY;
                    initialTranslateX = state.translateX;
                    initialTranslateY = state.translateY;
                    
                    // Deselect if clicking background
                    if (!e.shiftKey) selectHold(null);
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (state.dragState && state.dragState.type === 'label') {
                e.preventDefault();
                // Dragging label only updates label position (not bbox)
                const dx = (e.clientX - state.dragState.startX) / state.scale;
                const dy = (e.clientY - state.dragState.startY) / state.scale;
                
                const currentHold = state.wallHolds.find(h => h.id === state.dragState.holdId);
                if (currentHold) {
                    const newX = state.dragState.originalX + dx;
                    const newY = state.dragState.originalY + dy;
                    
                    // Relative to hold top left
                    const labelRelX = newX - currentHold.x1;
                    const labelRelY = newY - currentHold.y1;
                    
                    const relXpct = (labelRelX / (currentHold.x2 - currentHold.x1)) * 100;
                    const relYpct = (labelRelY / (currentHold.y2 - currentHold.y1)) * 100;
                    
                    state.dragState.element.style.left = `${relXpct}%`;
                    state.dragState.element.style.top = `${relYpct}%`;
                    state.dragState.element.style.marginLeft = '0';
                    state.dragState.element.style.marginTop = '0';
                }
                return;
            }

            if (state.dragState && state.dragState.type === 'hold-move') {
                e.preventDefault();
                const dx = (e.clientX - state.dragState.startX) / state.scale;
                const dy = (e.clientY - state.dragState.startY) / state.scale;

                let newX1 = state.dragState.origX1 + dx;
                let newY1 = state.dragState.origY1 + dy;
                let newX2 = state.dragState.origX2 + dx;
                let newY2 = state.dragState.origY2 + dy;

                state.dragState.currentX1 = newX1;
                state.dragState.currentY1 = newY1;
                state.dragState.currentX2 = newX2;
                state.dragState.currentY2 = newY2;

                const leftPct = (newX1 / state.imageNaturalWidth) * 100;
                const topPct = (newY1 / state.imageNaturalHeight) * 100;

                state.dragState.element.style.left = `${leftPct}%`;
                state.dragState.element.style.top = `${topPct}%`;
                return;
            }

            if (state.dragState && state.dragState.type === 'hold-resize') {
                e.preventDefault();
                const dx = (e.clientX - state.dragState.startX) / state.scale;
                const dy = (e.clientY - state.dragState.startY) / state.scale;

                let newX1 = state.dragState.origX1;
                let newY1 = state.dragState.origY1;
                let newX2 = state.dragState.origX2;
                let newY2 = state.dragState.origY2;

                if (state.dragState.handle.includes('w')) newX1 += dx;
                if (state.dragState.handle.includes('e')) newX2 += dx;
                if (state.dragState.handle.includes('n')) newY1 += dy;
                if (state.dragState.handle.includes('s')) newY2 += dy;

                // Enforce minimum size (5px)
                if (newX2 - newX1 < 5) {
                    if (state.dragState.handle.includes('w')) newX1 = newX2 - 5;
                    else newX2 = newX1 + 5;
                }
                if (newY2 - newY1 < 5) {
                    if (state.dragState.handle.includes('n')) newY1 = newY2 - 5;
                    else newY2 = newY1 + 5;
                }

                state.dragState.currentX1 = newX1;
                state.dragState.currentY1 = newY1;
                state.dragState.currentX2 = newX2;
                state.dragState.currentY2 = newY2;

                const leftPct = (newX1 / state.imageNaturalWidth) * 100;
                const topPct = (newY1 / state.imageNaturalHeight) * 100;
                const widthPct = ((newX2 - newX1) / state.imageNaturalWidth) * 100;
                const heightPct = ((newY2 - newY1) / state.imageNaturalHeight) * 100;

                state.dragState.element.style.left = `${leftPct}%`;
                state.dragState.element.style.top = `${topPct}%`;
                state.dragState.element.style.width = `${widthPct}%`;
                state.dragState.element.style.height = `${heightPct}%`;
                return;
            }

            if (state.isAddingHold && tempHoldBox.style.display === 'block') {
                e.preventDefault();
                const coords = getViewportToImageCoords(e.clientX, e.clientY);
                updateTempBox(state.addStartX, state.addStartY, coords.x, coords.y);
                return;
            }

            if (!isDragging) return;
            e.preventDefault();
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            state.translateX = initialTranslateX + dx;
            state.translateY = initialTranslateY + dy;
            
            updateTransform(false);
        });

        window.addEventListener('mouseup', (e) => {
            if (state.dragState && state.dragState.type === 'label') {
                const dx = (e.clientX - state.dragState.startX) / state.scale;
                const dy = (e.clientY - state.dragState.startY) / state.scale;
                
                const newX = state.dragState.originalX + dx;
                const newY = state.dragState.originalY + dy;
                
                // Save label coords
                saveHold(state.dragState.holdId, {
                    label_x: newX,
                    label_y: newY
                });
                
                state.dragState = null;
                return;
            }

            if (state.dragState && (state.dragState.type === 'hold-move' || state.dragState.type === 'hold-resize')) {
                if (state.dragState.currentX1 !== undefined) {
                    saveHold(state.dragState.holdId, {
                        x1: state.dragState.currentX1,
                        y1: state.dragState.currentY1,
                        x2: state.dragState.currentX2,
                        y2: state.dragState.currentY2
                    });
                } else if (state.dragState.type === 'hold-move') {
                    // Clicked without moving
                }
                canvasContainer.classList.remove('is-editing');
                state.dragState = null;
                return;
            }

            if (state.isAddingHold && tempHoldBox.style.display === 'block') {
                tempHoldBox.style.display = 'none';
                
                const coords = getViewportToImageCoords(e.clientX, e.clientY);
                const x1 = Math.min(state.addStartX, coords.x);
                const y1 = Math.min(state.addStartY, coords.y);
                const x2 = Math.max(state.addStartX, coords.x);
                const y2 = Math.max(state.addStartY, coords.y);
                
                // Minimum box size guard
                if (x2 - x1 > 5 && y2 - y1 > 5) {
                    createHold({
                        x1, y1, x2, y2,
                        class_name: 'hold',
                        is_hidden: false,
                        label_text: 'Manual'
                    });
                }
                
                exitAddMode();
                return;
            }

            if (isDragging) {
                isDragging = false;
            }
        });

        function updateTempBox(startX, startY, endX, endY) {
            const x = Math.min(startX, endX);
            const y = Math.min(startY, endY);
            const w = Math.abs(endX - startX);
            const h = Math.abs(endY - startY);
            
            const leftPct = (x / state.imageNaturalWidth) * 100;
            const topPct = (y / state.imageNaturalHeight) * 100;
            const widthPct = (w / state.imageNaturalWidth) * 100;
            const heightPct = (h / state.imageNaturalHeight) * 100;
            
            tempHoldBox.style.left = `${leftPct}%`;
            tempHoldBox.style.top = `${topPct}%`;
            tempHoldBox.style.width = `${widthPct}%`;
            tempHoldBox.style.height = `${heightPct}%`;
        }

        // When true, viewport interactions are disabled and drag creates new hold bbox
        // IMPORTANT:
        // - Must not conflict with pan/zoom
        // - Escape cancels mode
        btnAddHold.addEventListener('click', () => {
            if (state.isAddingHold) {
                exitAddMode();
            } else {
                state.isAddingHold = true;
                btnAddHold.style.background = 'var(--primary)';
                btnAddHold.style.color = 'white';
                canvasContainer.classList.add('adding-hold');
            }
        });

        function exitAddMode() {
            state.isAddingHold = false;
            btnAddHold.style.background = 'rgba(59, 130, 246, 0.2)';
            btnAddHold.style.color = '#93c5fd';
            canvasContainer.classList.remove('adding-hold');
            tempHoldBox.style.display = 'none';
        }

        // Keyboard Escape
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                // Cancel drag
                if (state.dragState) {
                    // Restore original visual
                    canvasContainer.classList.remove('is-editing');
                    renderHolds(); 
                    state.dragState = null;
                }
                // Cancel add hold mode
                if (state.isAddingHold) {
                    exitAddMode();
                }
                // Deselect hold
                selectHold(null);
            }
        });

        // Mouse Wheel Zooming
        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            const delta = e.deltaY * -0.001;
            let newScale = state.scale * (1 + delta); // Multiplicative zoom feels more natural
            newScale = Math.min(Math.max(MIN_ZOOM, newScale), MAX_ZOOM);
            
            // Zoom towards mouse pointer logic
            // 1. Get pointer position relative to viewport center
            const rect = viewport.getBoundingClientRect();
            const mouseX = e.clientX - rect.left - rect.width / 2;
            const mouseY = e.clientY - rect.top - rect.height / 2;
            
            // 2. Adjust translation to keep the "mouse point" fixed
            // The ratio of old vs new scale gives us how much the translation should change
            const scaleRatio = newScale / state.scale;
            state.translateX = mouseX - (mouseX - state.translateX) * scaleRatio;
            state.translateY = mouseY - (mouseY - state.translateY) * scaleRatio;
            
            state.scale = newScale;
            updateTransform(false);
        });

        // Button Controls
        btnZoomIn.addEventListener('click', () => {
             state.scale = Math.min(state.scale * 1.5, MAX_ZOOM);
             updateTransform(true);
        });
        
        btnZoomOut.addEventListener('click', () => {
             state.scale = Math.max(state.scale / 1.5, MIN_ZOOM);
             updateTransform(true);
        });
        
        btnZoomReset.addEventListener('click', resetViewport);

        // --- Opacity Control ---
        opacitySlider.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--overlay-opacity', e.target.value);
        });

        // Start
        checkAuthAndInit();


        // --- Routes Implementation ---
        const routeSelect = document.getElementById('route-select');
        const routeInspectorBody = document.getElementById('route-inspector-body');
        const btnCreateRoute = document.getElementById('btn-create-route');

        async function loadRoutes() {
            try {
                const res = await fetch(`/bbro/api/walls/${wallId}/routes`, { headers: getAuthHeaders() });
                if (!res.ok) throw new Error("Failed to load routes");
                state.routes = await res.json();
                
                // For each route, fetch its full details (which includes holds)
                for (let i=0; i<state.routes.length; i++) {
                    const rRes = await fetch(`/bbro/api/routes/${state.routes[i].id}`, { headers: getAuthHeaders() });
                    if (rRes.ok) {
                        const rDetails = await rRes.json();
                        state.routes[i] = rDetails; // replaced with full details which has holds array
                    }
                }
                
                renderRouteSelect();
                renderRouteInspector();
                renderHolds(); // update visuals just in case route membership changed
            } catch (err) {
                console.error("loadRoutes error:", err);
            }
        }

        function renderRouteSelect() {
            const currentVal = routeSelect.value;
            routeSelect.innerHTML = '<option value="">-- Select a Route --</option>';
            state.routes.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.id;
                opt.textContent = `${r.name || 'Unnamed'} (${r.difficulty || 'Unrated'})`;
                routeSelect.appendChild(opt);
            });
            if (state.activeRouteId) {
                routeSelect.value = state.activeRouteId;
            }
        }
        
        routeSelect.addEventListener('change', (e) => {
            state.activeRouteId = e.target.value || null;
            if (!state.activeRouteId) {
                state.isRouteMode = false;
                document.body.classList.remove('route-mode-active');
            }
            renderRouteInspector();
            renderHolds();
        });

        btnCreateRoute.addEventListener('click', async () => {
            const name = prompt("Route Name", "New Route");
            if (!name) return;
            const difficulty = prompt("Route Difficulty", "V0");
            
            try {
                const res = await fetch(`/bbro/api/walls/${wallId}/routes`, {
                    method: 'POST',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, difficulty, description: "", created_by: localStorage.getItem('hd_username') })
                });
                if (!res.ok) throw new Error("Failed to create route");
                const newRoute = await res.json();
                newRoute.holds = [];
                state.routes.unshift(newRoute);
                state.activeRouteId = newRoute.id;
                
                renderRouteSelect();
                renderRouteInspector();
                renderHolds();
            } catch (err) {
                console.error(err);
                alert("Error creating route");
            }
        });

        function renderRouteInspector() {
            if (!state.activeRouteId) {
                routeInspectorBody.innerHTML = '<div class="empty-state">Select or create a route.</div>';
                return;
            }
            
            const route = state.routes.find(r => r.id === state.activeRouteId);
            if (!route) return;
            
            let holdsHtml = '';
            const routeHolds = route.holds || [];
            
            if (routeHolds.length === 0) {
                holdsHtml = '<div class="empty-state" style="margin-top:0;">No holds added yet.</div>';
            } else {
                routeHolds.forEach(rh => {
                    const wh = state.wallHolds.find(w => w.id === rh.wall_hold_id);
                    const holdName = wh ? (wh.label_text ? `${wh.class_name} "${wh.label_text}"` : wh.class_name) : rh.wall_hold_id;
                    
                    holdsHtml += `
                    <div class="route-hold-item" data-rh-id="${rh.route_hold_id}">
                        <div style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${holdName}">${holdName}</div>
                        <select class="rh-role" style="width: 80px;" title="Role">
                            <option value="Foot" ${rh.role === 'Foot' ? 'selected' : ''}>Foot</option>
                            <option value="Hand" ${rh.role === 'Hand' ? 'selected' : ''}>Hand</option>
                            <option value="Start" ${rh.role === 'Start' ? 'selected' : ''}>Start</option>
                            <option value="Finish" ${rh.role === 'Finish' ? 'selected' : ''}>Finish</option>
                            <option value="Volume" ${rh.role === 'Volume' ? 'selected' : ''}>Volume</option>
                        </select>
                        <input type="number" class="rh-order" style="width: 50px;" value="${rh.order_index !== null ? rh.order_index : ''}" placeholder="Ord" title="Order Index">
                        <button class="btn-remove-rh" style="background: none; border: none; color: #ef4444; cursor: pointer; font-weight: bold;">×</button>
                    </div>`;
                });
            }

            routeInspectorBody.innerHTML = `
                <div class="form-group" style="margin-bottom: 1rem; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 0.5rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; color: white;">
                        <input type="checkbox" id="chk-route-mode" ${state.isRouteMode ? 'checked' : ''} style="width: 1.2rem; height: 1.2rem;"> 
                        <strong>Route Editing Mode</strong>
                    </label>
                    <p style="font-size: 0.75rem; color: #94a3b8; margin: 0.5rem 0 0 0;">
                        When ON, clicking holds on the wall toggles them in this route. Wall interactions (move/resize) are disabled.
                    </p>
                </div>

                <div class="form-group">
                    <label>Route Name</label>
                    <input type="text" class="form-control" id="rt-name" value="${route.name || ''}">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Difficulty</label>
                        <input type="text" class="form-control" id="rt-difficulty" value="${route.difficulty || ''}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-control" id="rt-description" rows="3">${route.description || ''}</textarea>
                </div>

                <div style="margin-top: 1.5rem; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.85rem; text-transform: uppercase;">
                    Route Holds (${routeHolds.length})
                </div>
                ${holdsHtml}

                <div style="margin-top: 2rem;">
                    <button id="btn-delete-route" style="width: 100%; padding: 0.75rem; background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; border-radius: 0.5rem; cursor: pointer; font-weight: bold; transition: all 0.2s;">
                        Delete Route
                    </button>
                </div>
            `;

            // Bind events
            document.getElementById('chk-route-mode').addEventListener('change', (e) => {
                state.isRouteMode = e.target.checked;
                if (state.isRouteMode) {
                    document.body.classList.add('route-mode-active');
                    canvasContainer.classList.remove('is-editing');
                    selectHold(null); // deselect any wall hold to clear UI clutter
                } else {
                    document.body.classList.remove('route-mode-active');
                }
                renderHolds();
            });

            const saveRouteMeta = async (payload) => {
                try {
                    await fetch(`/bbro/api/routes/${route.id}`, {
                        method: 'PATCH',
                        headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    Object.assign(route, payload);
                    renderRouteSelect();
                } catch(e) { console.error(e); }
            };

            document.getElementById('rt-name').addEventListener('change', e => saveRouteMeta({name: e.target.value}));
            document.getElementById('rt-difficulty').addEventListener('change', e => saveRouteMeta({difficulty: e.target.value}));
            document.getElementById('rt-description').addEventListener('change', e => saveRouteMeta({description: e.target.value}));
            
            document.getElementById('btn-delete-route').addEventListener('click', async () => {
                if (!confirm("Delete this route?")) return;
                try {
                    await fetch(`/bbro/api/routes/${route.id}`, { method: 'DELETE', headers: getAuthHeaders() });
                    state.routes = state.routes.filter(r => r.id !== route.id);
                    state.activeRouteId = null;
                    state.isRouteMode = false;
                    document.body.classList.remove('route-mode-active');
                    renderRouteSelect();
                    renderRouteInspector();
                    renderHolds();
                } catch (e) {
                    console.error(e);
                    alert("Error deleting route.");
                }
            });

            // Bind events for route holds (Update & Remove)
            document.querySelectorAll('.route-hold-item').forEach(el => {
                const rhId = el.dataset.rhId;
                const roleSel = el.querySelector('.rh-role');
                const ordInp = el.querySelector('.rh-order');
                const rmBtn = el.querySelector('.btn-remove-rh');

                roleSel.addEventListener('change', e => updateRouteHold(route.id, rhId, { role: e.target.value }));
                ordInp.addEventListener('change', e => {
                    const val = e.target.value ? parseInt(e.target.value, 10) : null;
                    updateRouteHold(route.id, rhId, { order_index: val });
                });
                rmBtn.addEventListener('click', () => removeHoldFromRoute(route.id, rhId));
            });
        }

        async function toggleRouteHold(wallHoldId) {
            if (!state.activeRouteId) return;
            const route = state.routes.find(r => r.id === state.activeRouteId);
            if (!route) return;

            const existing = (route.holds || []).find(rh => rh.wall_hold_id === wallHoldId);
            if (existing) {
                await removeHoldFromRoute(route.id, existing.route_hold_id);
            } else {
                await addHoldToRoute(route.id, wallHoldId);
            }
        }

        async function addHoldToRoute(routeId, wallHoldId) {
            try {
                const res = await fetch(`/bbro/api/routes/${routeId}/holds`, {
                    method: 'POST',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wall_hold_id: wallHoldId, role: 'Hand', order_index: null })
                });
                if (!res.ok) {
                    const errPayload = await res.json();
                    throw new Error(errPayload.detail || "Failed to add hold");
                }
                await reloadActiveRoute(routeId);
            } catch (err) {
                console.error(err);
                alert("Could not add hold: " + err.message);
            }
        }

        async function removeHoldFromRoute(routeId, routeHoldId) {
            try {
                const res = await fetch(`/bbro/api/routes/${routeId}/holds/${routeHoldId}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });
                if (!res.ok) throw new Error("Failed to remove hold");
                await reloadActiveRoute(routeId);
            } catch (err) {
                console.error(err);
            }
        }

        async function updateRouteHold(routeId, routeHoldId, payload) {
            try {
                const res = await fetch(`/bbro/api/routes/${routeId}/holds/${routeHoldId}`, {
                    method: 'PATCH',
                    headers: { ...getAuthHeaders(), 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error("Failed to update hold");
                await reloadActiveRoute(routeId);
            } catch (err) {
                console.error(err);
            }
        }

        async function reloadActiveRoute(routeId) {
            try {
                const res = await fetch(`/bbro/api/routes/${routeId}`, { headers: getAuthHeaders() });
                if (res.ok) {
                    const fullRoute = await res.json();
                    const idx = state.routes.findIndex(r => r.id === routeId);
                    if (idx > -1) {
                        state.routes[idx] = fullRoute;
                        if (state.activeRouteId === routeId) {
                            renderRouteInspector();
                            renderHolds(); // re-render visual indications
                        }
                    }
                }
            } catch(e) {
                console.error("Error reloading route:", e);
            }
        }

    </script>
</body>
</html>
